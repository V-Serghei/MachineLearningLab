name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Check syntax
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./.git/*" \
            -not -path "./.ipynb_checkpoints/*" \
          | xargs python -m py_compile
          echo "All syntax checks passed"

  install:
    name: Dependency install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: pip install pandas numpy matplotlib seaborn scikit-learn scipy

      - name: Verify core imports
        run: python -c "import pandas, numpy, matplotlib, seaborn, sklearn, scipy; print('Core imports OK')"
